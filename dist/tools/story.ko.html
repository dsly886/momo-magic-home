<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="story.page_title">AI 스토리 워크숍</title>
  <meta name="description" data-i18n-meta="story.meta_desc" content="AI 스토리 워크숍 — 테마와 캐릭터를 입력하면 AI가 독특한 마법 이야기를 엮어드립니다. 판타지, 감동, 모험 스타일을 지원합니다.">
  <meta name="keywords" content="AI Story,Story Creation,Magical Tales,Fantasy Stories,AI Writing,Creative Writing">
  <meta name="robots" content="index, follow">
  <!-- Open Graph -->
  <meta property="og:title" content="AI Story Workshop - momo's Magic House">
  <meta property="og:description" content="Enter a theme and characters, let AI weave unique magical tales.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="AI Story Workshop - momo's Magic House">
  <meta name="twitter:description" content="Enter a theme and characters, let AI weave unique magical tales.">
  <link rel="canonical" href="https://momo-magic-house.app/tools/story.html">
  <link rel="stylesheet" href="../css/magic.css">
  <style>
    .style-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .style-option {
      flex: 1;
      min-width: 100px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--color-text-dim);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      font-family: inherit;
    }
    .style-option:hover {
      border-color: var(--color-magic-blue);
      color: var(--color-text);
    }
    .style-option.selected {
      border-color: var(--color-magic-blue);
      background: rgba(74, 108, 247, 0.15);
      color: #93bbfc;
      box-shadow: 0 0 10px rgba(74, 108, 247, 0.2);
    }
    .story-output {
      font-family: var(--font-magical);
      letter-spacing: 0.3px;
      line-height: 2;
    }
  </style>
  <!-- hreflang tags -->
  <link rel="alternate" hreflang="zh" href="/tools/story.zh.html">
  <link rel="alternate" hreflang="en" href="/tools/story.html">
  <link rel="alternate" hreflang="fr" href="/tools/story.fr.html">
  <link rel="alternate" hreflang="de" href="/tools/story.de.html">
  <link rel="alternate" hreflang="ru" href="/tools/story.ru.html">
  <link rel="alternate" hreflang="es" href="/tools/story.es.html">
  <link rel="alternate" hreflang="pt" href="/tools/story.pt.html">
  <link rel="alternate" hreflang="ar" href="/tools/story.ar.html">
  <link rel="alternate" hreflang="ja" href="/tools/story.ja.html">
  <link rel="alternate" hreflang="ko" href="/tools/story.ko.html">
  <link rel="alternate" hreflang="th" href="/tools/story.th.html">
</head>
<body>
  <div id="stars-container" class="starry-bg"></div>

  <div class="tool-container">
    <nav class="tool-nav" aria-label="页面导航">
      <a href="../index.html" class="back-link" data-i18n="common.back_link" aria-label="Back to Magic House">← 매직 하우스로 돌아가기</a>
    </nav>

    <header class="tool-header">
      <span class="tool-icon">📖</span>
      <h1 data-i18n="story.header_title">AI 스토리 워크숍</h1>
      <p data-i18n="story.header_desc">아이디어를 공유하세요. AI가 당신만의 특별한 마법 이야기를 엮어드립니다</p>
    </header>

    <div class="tool-body">
      <form id="magic-form">
        <div class="form-group">
          <label data-i18n="story.theme_label">📌 이야기 테마 / 배경</label>
          <input type="text" id="theme-input" class="magic-input" data-i18n-placeholder="예: 달빛 숲, 바닷속 왕국, 구름 위의 성..." placeholder="예: 달빛 숲, 바닷속 왕국, 구름 위의 성..." required>
        </div>
        <div class="form-group">
          <label data-i18n="story.characters_label">👤 주요 캐릭터</label>
          <input type="text" id="characters-input" class="magic-input" data-i18n-placeholder="예: 용감한 작은 토끼, 말하는 별..." placeholder="예: 용감한 작은 토끼, 말하는 별..." required>
        </div>
        <div class="form-group">
          <label data-i18n="story.style_label">🎭 이야기 스타일</label>
          <div class="style-options" id="style-options">
            <button type="button" class="style-option selected" data-value="fantasy" data-i18n="story.style_fantasy">🧙 판타지</button>
            <button type="button" class="style-option" data-value="warm" data-i18n="story.style_warm">🌺 감동</button>
            <button type="button" class="style-option" data-value="adventure" data-i18n="story.style_adventure">⚔️ 모험</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-magic" id="submit-btn" data-i18n="story.submit_btn">✨ 이야기 엮기</button>
        </div>
      </form>

      <div class="magic-loading" id="loading" style="display:none;">
        <div class="magic-spinner"></div>
        <span data-i18n="story.loading_text">📖 음유시인이 이야기를 엮고 있습니다...</span>
      </div>

      <div class="result-box glow-blue" id="result-box">
        <div class="result-title" data-i18n="story.result_title">✦ 이야기 ✦</div>
        <div class="result-placeholder">
          <div class="placeholder-icon">📖</div>
          <span data-i18n="story.placeholder_text">테마와 캐릭터를 입력하고 «이야기 엮기»를 클릭하세요</span>
        </div>
        <div class="result-content story-output" style="display:none;"></div>
        <button class="btn-copy" onclick="copyResult()" data-i18n="story.copy_btn" style="display:none;">📋 이야기 복사</button>
      </div>
    </div>
  </div>

  <script src="../js/env.js?v=2"></script>
  <script src="../js/i18n.js?v=2"></script>
  <script src="../js/magic-utils.js?v=4"></script>
  <script src="../js/magic-api.js?v=2"></script>
  <script>
    let selectedStyle = 'fantasy';

    // Style selector
    document.querySelectorAll('.style-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.style-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedStyle = btn.dataset.value;
      });
    });

    function copyResult() {
      const text = document.querySelector('.result-content').textContent;
      MagicUtils.copyToClipboard(text);
    }

    Env.load().then(() => i18n.init());

    MagicUtils.initToolPage({
      title: 'AI Story Workshop',
      formId: 'magic-form',
      inputIds: ['theme-input', 'characters-input'],
      submitBtnId: 'submit-btn',
      resultBoxId: 'result-box',
      loadingId: 'loading',
      glowColor: 'blue',
      apiMethod: (theme, characters) => MagicAPI.generateStory(theme, characters, selectedStyle),
    });
  </script>
</body>
</html>
