    .dream-output {
      font-family: var(--font-magical);
      line-height: 2;
    }
    .dream-input-hint {
      text-align: center;
      color: var(--color-text-dim);
      font-size: 13px;
      margin-top: 6px;
    }
  </style>

  <link rel="alternate" hreflang="zh" href="/tools/dream.zh.html">
  <link rel="alternate" hreflang="en" href="/tools/dream.html">

  <link rel="alternate" hreflang="de" href="/tools/dream.de.html">
  <link rel="alternate" hreflang="ru" href="/tools/dream.ru.html">
  <link rel="alternate" hreflang="es" href="/tools/dream.es.html">
  <link rel="alternate" hreflang="pt" href="/tools/dream.pt.html">
  <link rel="alternate" hreflang="ar" href="/tools/dream.ar.html">
  <link rel="alternate" hreflang="ja" href="/tools/dream.ja.html">
  <link rel="alternate" hreflang="ko" href="/tools/dream.ko.html">
  <link rel="alternate" hreflang="th" href="/tools/dream.th.html">
</head>
<body>
  <div id="stars-container" class="starry-bg"></div>

  <div class="tool-container">
    <nav class="tool-nav" aria-label="页面导航">
      <a href="../index.html" class="back-link" data-i18n="common.back_link" aria-label="Back to Magic House">← กลับไปยังบ้านมหัศจรรย์</a>
    </nav>

    <header class="tool-header">
      <span class="tool-icon">🌙</span>
      <h1 data-i18n="dream.header_title">ผู้ทำนายฝัน</h1>
      <p data-i18n="dream.header_desc">อธิบายความฝันของคุณ AI ช่วยไขปริศนาและเปิดเผยความหมาย</p>
    </header>

    <div class="tool-body">
      <form id="magic-form">
        <div class="form-group">
          <label data-i18n="dream.dream_label">🌜 อธิบายความฝันของคุณ</label>
          <textarea id="dream-input" class="magic-input" rows="5" data-i18n-placeholder="อธิบายความฝันของคุณให้ละเอียดที่สุดเท่าที่เป็นไปได้ — คุณเห็นอะไร? คุณรู้สึกอย่างไร? มีฉากหรือผู้คนพิเศษใด ๆ หรือไม่?

เช่น: ฉันฝันว่ากำลังวิ่งอยู่บนก้อนเมฆ รายล้อมด้วยแสงสีทอง มีปราสาทคริสตัลอยู่ไกล ๆ..." placeholder="อธิบายความฝันของคุณให้ละเอียดที่สุดเท่าที่เป็นไปได้ — คุณเห็นอะไร? คุณรู้สึกอย่างไร? มีฉากหรือผู้คนพิเศษใด ๆ หรือไม่?

เช่น: ฉันฝันว่ากำลังวิ่งอยู่บนก้อนเมฆ รายล้อมด้วยแสงสีทอง มีปราสาทคริสตัลอยู่ไกล ๆ..." required></textarea>
          <p class="dream-input-hint" data-i18n="dream.dream_hint">ยิ่งคุณให้รายละเอียดมากเท่าไหร่ การทำนายก็จะแม่นยำมากขึ้นเท่านั้น ✨</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-magic" id="submit-btn" data-i18n="dream.submit_btn">🌙 ทำนายฝัน</button>
        </div>
      </form>

      <div class="magic-loading" id="loading" style="display:none;">
        <div class="magic-spinner"></div>
        <span data-i18n="dream.loading_text">🌙 ผู้ทำนายฝันกำลังวิเคราะห์ความฝันของคุณ...</span>
      </div>

      <div class="result-box glow-purple" id="result-box">
        <div class="result-title" data-i18n="dream.result_title">✦ การทำนายฝัน ✦</div>
        <div class="result-placeholder">
          <div class="placeholder-icon">🌙</div>
          <span data-i18n="dream.placeholder_text">ป้อนความฝัน คลิก «ทำนายฝัน» เพื่อดูผลลัพธ์</span>
        </div>
        <div class="result-content dream-output" style="display:none;"></div>
        <button class="btn-copy" onclick="copyResult()" data-i18n="dream.copy_btn" style="display:none;">📋 บันทึกการทำนาย</button>
      </div>
    </div>
  </div>

  <script src="../js/env.js?v=2"></script>
  <script src="../js/i18n.js?v=2"></script>
  <script src="../js/magic-utils.js?v=4"></script>
  <script src="../js/magic-api.js?v=2"></script>
  <script>
    function copyResult() {
      const text = document.querySelector('.result-content').textContent;
      MagicUtils.copyToClipboard(text);
    }

    Env.load().then(() => i18n.init());

    MagicUtils.initToolPage({
      title: 'Dream Interpreter',
      formId: 'magic-form',
      inputIds: ['dream-input'],
      submitBtnId: 'submit-btn',
      resultBoxId: 'result-box',
      loadingId: 'loading',
      glowColor: 'purple',
      apiMethod: (dream) => MagicAPI.interpretDream(dream),
    });
  </script>
</body>
</html>
