<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="wish.page_title">소원 우물</title>
  <meta name="description" data-i18n-meta="wish.meta_desc" content="소원 우물 — 별에 소원을 빌면 우주로부터 시적인 답변이 도착합니다. 모든 소원은 따뜻함과 희망으로 답해집니다.">
  <meta name="keywords" content="AI Wish,Wishing Well,Star Wish,Poetic Reply,Emotional Companion,Warm Text">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Wishing Well - momo's Magic House">
  <meta property="og:description" content="Make a wish upon the stars, receive a poetic reply from the universe.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Wishing Well - momo's Magic House">
  <meta name="twitter:description" content="Make a wish upon the stars, receive a poetic reply from the universe.">
  <link rel="canonical" href="https://momo-magic-house.app/tools/wish.html">
  <link rel="stylesheet" href="../css/magic.css">
  <style>
    .wish-output {
      font-family: var(--font-magical);
      line-height: 2.2;
      text-align: center;
    }
    .wish-output .star-line {
      color: var(--color-gold);
      font-size: 18px;
      letter-spacing: 2px;
    }
    .wish-decoration {
      text-align: center;
      font-size: 32px;
      margin-bottom: 12px;
      animation: star-pulse 2s ease-in-out infinite;
    }
    @keyframes star-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
  <!-- hreflang tags -->
  <link rel="alternate" hreflang="zh" href="/tools/wish.zh.html">
  <link rel="alternate" hreflang="en" href="/tools/wish.html">
  <link rel="alternate" hreflang="fr" href="/tools/wish.fr.html">
  <link rel="alternate" hreflang="de" href="/tools/wish.de.html">
  <link rel="alternate" hreflang="ru" href="/tools/wish.ru.html">
  <link rel="alternate" hreflang="es" href="/tools/wish.es.html">
  <link rel="alternate" hreflang="pt" href="/tools/wish.pt.html">
  <link rel="alternate" hreflang="ar" href="/tools/wish.ar.html">
  <link rel="alternate" hreflang="ja" href="/tools/wish.ja.html">
  <link rel="alternate" hreflang="ko" href="/tools/wish.ko.html">
  <link rel="alternate" hreflang="th" href="/tools/wish.th.html">
</head>
<body>
  <div id="stars-container" class="starry-bg"></div>

  <div class="tool-container">
    <nav class="tool-nav" aria-label="页面导航">
      <a href="../index.html" class="back-link" data-i18n="common.back_link" aria-label="Back to Magic House">← 매직 하우스로 돌아가기</a>
    </nav>

    <header class="tool-header">
      <span class="tool-icon">⭐</span>
      <h1 data-i18n="wish.header_title">소원 우물</h1>
      <p data-i18n="wish.header_desc">별에 소원을 빌어 우주로부터 시적인 답변을 받아보세요</p>
    </header>

    <div class="tool-body">
      <form id="magic-form">
        <div class="form-group">
          <label data-i18n="wish.wish_label">🌟 소원을 적어주세요</label>
          <textarea id="wish-input" class="magic-input" rows="4" data-i18n-placeholder="가장 진심 어린 소원을 적어보세요...
예: 가족의 건강과 행복을 바랍니다, 인생의 방향을 찾을 수 있기를..." placeholder="가장 진심 어린 소원을 적어보세요...
예: 가족의 건강과 행복을 바랍니다, 인생의 방향을 찾을 수 있기를..." required></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-magic" id="submit-btn" data-i18n="wish.submit_btn">⭐ 별에 소원 빌기</button>
        </div>
      </form>

      <div class="magic-loading" id="loading" style="display:none;">
        <div class="magic-spinner"></div>
        <span data-i18n="wish.loading_text">⭐ 별이 당신의 소원을 듣고 있습니다...</span>
      </div>

      <div class="result-box glow-gold" id="result-box">
        <div class="wish-decoration" data-i18n="wish.result_decoration">🌙 ⭐ 🌟</div>
        <div class="result-title" data-i18n="wish.result_title">✦ 별의 답장 ✦</div>
        <div class="result-placeholder">
          <div class="placeholder-icon">⭐</div>
          <span data-i18n="wish.placeholder_text">소원을 적고 «별에 소원 빌기»를 클릭하세요</span>
        </div>
        <div class="result-content wish-output" style="display:none;"></div>
        <button class="btn-copy" onclick="copyResult()" data-i18n="wish.copy_btn" style="display:none;">📋 이 답장 저장</button>
      </div>
    </div>
  </div>

  <script src="../js/env.js?v=2"></script>
  <script src="../js/i18n.js?v=2"></script>
  <script src="../js/magic-utils.js?v=4"></script>
  <script src="../js/magic-api.js?v=2"></script>
  <script>
    function copyResult() {
      const text = document.querySelector('.result-content').textContent;
      MagicUtils.copyToClipboard(text);
    }

    Env.load().then(() => i18n.init());

    MagicUtils.initToolPage({
      title: 'Wishing Well',
      formId: 'magic-form',
      inputIds: ['wish-input'],
      submitBtnId: 'submit-btn',
      resultBoxId: 'result-box',
      loadingId: 'loading',
      glowColor: 'gold',
      apiMethod: (wish) => MagicAPI.makeWish(wish),
    });
  </script>
</body>
</html>
